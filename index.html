<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Bookstore</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📚 Online Bookstore Management</h1>

        <div class="card">

            <h2>Add New Book</h2>

            <form id="bookForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Book Title"
                    required
                >

                <input
                    type="text"
                    id="author"
                    placeholder="Author Name"
                    required
                >

                <input
                    type="text"
                    id="genre"
                    placeholder="Genre"
                >

                <input
                    type="number"
                    id="price"
                    placeholder="Price"
                    required
                >

                <button type="submit">
                    Add Book
                </button>

            </form>

        </div>

        <div class="card">

            <h2>Books List</h2>

            <div id="booksList">

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
